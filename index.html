<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お気楽屋商店 前</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background-image: url('okirakuyashouten.png');
      background-size: cover;
      background-position: center top;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      color: white;
    }

    .box {
      background: rgba(0,0,0,0.4);
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      backdrop-filter: blur(4px);
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>お気楽屋商店 前</h1>

    <p>
      今日は、何もしない。<br>
    
    </p>

    <button onclick="toggleAudio()" id="musicButton">
      休憩する
    </button>
    <br><br>

<button onclick="changeMusic('unn.mp3')">
  今月の曲
</button>

<button onclick="changeMusic('te.mp3')">
  テーマ曲
</button>

<button onclick="changeMusic('end.mp3')">
  エンディング曲
</button>
  </div>

 <audio id="bgm" src="Raim.mp3" loop></audio>

 <script>
  const audio = document.getElementById('bgm');
  const button = document.getElementById('musicButton');

  let isPlaying = false;

  function toggleAudio() {

    if (isPlaying) {
      audio.pause();
      button.innerText = '休憩する';
    } else {
      audio.play();
      button.innerText = '休憩を終える';
    }

    isPlaying = !isPlaying;
  }

  function changeMusic(song) {

  audio.src = song;
  audio.load();

  audio.play();

  isPlaying = true;

  button.innerText = '休憩を終える';
}
</script>

</body>
</html>
