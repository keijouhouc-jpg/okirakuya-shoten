<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お気楽屋商店 前</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background-image: url('okirakuyashouten.png');
      background-size: cover;
      background-position: center top;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: sans-serif;
      color: white;
    }

    .box {
      background: rgba(0,0,0,0.4);
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      backdrop-filter: blur(4px);
    }

    button {
      margin-top: 20px;
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      background: rgba(255,255,255,0.2);
      color: white;
      font-size: 16px;
    }
  </style>
</head>

<body>

  <div class="box">
    <h1>お気楽屋商店 前</h1>

    <p>
      今日は、何もしない。<br>
    
    </p>

    <button onclick="toggleAudio()" id="musicButton">
      休憩する
    </button>
    <br><br>

<button onclick="playMusic('unn.mp3')">
  今月の曲
</button>

<button onclick="playMusic('te.mp3')">
  テーマ曲
</button>

<button onclick="playMusic('end.mp3')">
  エンディング
</button>

<br><br>

<button onclick="stopMusic()">
  音を止める
</button>
  </div>

 <audio id="bgm" loop></audio>

 <script>

const audio = document.getElementById('bgm');

function playMusic(song) {

  audio.src = song;
  audio.load();
  audio.play();

}

function stopMusic() {

  audio.pause();

}

</script>

</body>
</html>
