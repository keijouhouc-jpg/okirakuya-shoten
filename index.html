<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お気楽屋商店</title>

  <style>
    body {
  margin: 0;
  height: 100vh;
  background-image: url('okirakuyashouten.png');
  background-size: cover;
  background-position: center top;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: sans-serif;
  color: white;

  touch-action: manipulation;
  overflow: hidden;
}
    }

   .box {
  background: rgba(0,0,0,0.4);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  backdrop-filter: blur(4px);

  width: 90%;
  max-width: 320px;
  margin: auto;
}
  position: relative;
  z-index: 10;
}

    button {

  appearance: none;
  -webkit-appearance: none;

  margin-top: 20px;
  padding: 16px 24px;

  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 999px;

  background: red;

  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);

  color: white;
  font-size: 18px;
}

  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
  </style>
</head>

<body>

  <div class="box">
    <h1>お気楽屋商店</h1>

    <p>
      今日は、何もしない。<br>
    </p>

<button onclick="playMusic('unn.mp3')">
  今月の曲
</button>

<button onclick="playMusic('te.mp3')">
  テーマ曲
</button>

<button onclick="playMusic('end.mp3')">
  エンディング曲
</button>

<br><br>

<button onclick="stopMusic()">
  音を止める
</button>
  </div>

 <audio id="bgm" ></audio>

 <script>

const audio = document.getElementById('bgm');

function playMusic(song) {

  audio.src = song;
  audio.load();
  audio.play().catch(error => {
  console.log(error);
});

}

function stopMusic() {

  audio.pause();

}

</script>

</body>
</html>
